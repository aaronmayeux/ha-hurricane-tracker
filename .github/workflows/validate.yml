name: Validate

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  validate-hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration
          github_token: ${{ secrets.GITHUB_TOKEN }}

  validate-hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master

  pytest:
    name: Unit tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pytest
        run: pip install pytest
      - name: Run tests
        run: python -m pytest tests -q
